<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UzRoulette</title>

  <style>
    /* Barcha elementlar uchun umumiy sozlama */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* Body - asosiy fon va shrift */
    body {
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top left, #13254d, #081224 45%, #050b16 100%);
      color: #ffffff;
      min-height: 100vh;
    }

    /* Tepaki panel */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 22px 28px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(7, 15, 30, 0.65);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }

    .brand {
      font-size: 42px;
      font-weight: 800;
      letter-spacing: 1px;
      color: #ffffff;
      text-shadow: 0 4px 14px rgba(37, 99, 235, 0.35);
    }

    .online-box {
      padding: 14px 18px;
      border-radius: 18px;
      background: linear-gradient(145deg, #152746, #0b1731);
      box-shadow:
        inset 0 1px 1px rgba(255,255,255,0.06),
        0 12px 25px rgba(0,0,0,0.28);
      font-size: 18px;
      color: #cfe2ff;
    }

    /* Asosiy konteyner */
    .main {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 22px;
      padding: 22px;
    }

    .left-side {
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    .video-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 22px;
    }

    .card {
      background: linear-gradient(145deg, rgba(17,28,52,0.95), rgba(8,15,31,0.95));
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 26px;
      padding: 18px;
      box-shadow:
        0 18px 45px rgba(0,0,0,0.32),
        inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .card-title {
      font-size: 28px;
      margin-bottom: 14px;
      color: #d8e6ff;
    }

    video {
      width: 100%;
      height: 360px;
      background: #000;
      border-radius: 20px;
      object-fit: cover;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.04),
        0 12px 30px rgba(0,0,0,0.25);
    }

    .control-panel {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
    }

    /* 3D tugmalar */
    .btn {
      border: none;
      border-radius: 18px;
      padding: 16px 22px;
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
      transform: translateY(0);
      box-shadow: 0 7px 0 rgba(0, 0, 0, 0.28), 0 15px 30px rgba(0, 0, 0, 0.22);
    }

    .btn:hover {
      filter: brightness(1.05);
      transform: translateY(-2px);
    }

    .btn:active {
      transform: translateY(5px);
      box-shadow: 0 2px 0 rgba(0, 0, 0, 0.28), 0 8px 18px rgba(0, 0, 0, 0.2);
    }

    .btn-blue {
      background: linear-gradient(180deg, #3c84ff, #2357d7);
    }

    .btn-red {
      background: linear-gradient(180deg, #ff4a4a, #d91d1d);
    }

    .btn-gray {
      background: linear-gradient(180deg, #61708d, #3d475c);
    }

    .status-box {
      min-height: 74px;
      padding: 18px 20px;
      font-size: 22px;
      border-radius: 18px;
      background: linear-gradient(145deg, #071428, #0d1c36);
      color: #9ec6ff;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.04),
        0 10px 28px rgba(0,0,0,0.2);
    }

    /* O‘ng taraf chat */
    .chat-card {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 132px);
    }

    .chat-header {
      font-size: 34px;
      font-weight: 800;
      margin-bottom: 12px;
      color: #ffffff;
    }

    .chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      border-radius: 18px;
      background: linear-gradient(145deg, #071428, #0b1830);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
      margin-bottom: 16px;
    }

    .msg {
      max-width: 85%;
      padding: 14px 16px;
      border-radius: 18px;
      margin-bottom: 12px;
      font-size: 18px;
      line-height: 1.5;
      word-break: break-word;
      box-shadow: 0 10px 20px rgba(0,0,0,0.18);
    }

    .me {
      margin-left: auto;
      background: linear-gradient(145deg, #347cff, #225de0);
    }

    .stranger {
      background: linear-gradient(145deg, #26344d, #1a2438);
      color: #ebf2ff;
    }

    .system {
      margin-left: auto;
      margin-right: auto;
      background: linear-gradient(145deg, #545d70, #3d4453);
      color: #ffffff;
      text-align: center;
      max-width: 95%;
    }

    .chat-input-row {
      display: flex;
      gap: 12px;
    }

    .chat-input-row input {
      flex: 1;
      border: none;
      outline: none;
      border-radius: 18px;
      padding: 18px 18px;
      font-size: 18px;
      color: #fff;
      background: linear-gradient(145deg, #1a2740, #101a2d);
      box-shadow:
        inset 0 1px 2px rgba(255,255,255,0.04),
        0 10px 18px rgba(0,0,0,0.18);
    }

    .send-btn {
      min-width: 140px;
      background: linear-gradient(180deg, #1fd88f, #0eae71);
    }

    /* Mobil uchun */
    @media (max-width: 1100px) {
      .main {
        grid-template-columns: 1fr;
      }

      .chat-card {
        height: auto;
      }
    }

    @media (max-width: 800px) {
      .video-grid {
        grid-template-columns: 1fr;
      }

      .brand {
        font-size: 32px;
      }

      .card-title,
      .chat-header {
        font-size: 24px;
      }

      .btn {
        font-size: 16px;
        padding: 14px 16px;
      }

      .status-box {
        font-size: 18px;
      }

      video {
        height: 240px;
      }
    }
  </style>
</head>
<body>
  <!-- Tepaki panel -->
  <div class="topbar">
    <div class="brand">UzRoulette</div>
    <div class="online-box">Online: <span id="onlineCount">0</span></div>
  </div>

  <!-- Asosiy sahifa -->
  <div class="main">
    <!-- Chap tomonda video va tugmalar -->
    <div class="left-side">
      <div class="video-grid">
        <div class="card">
          <div class="card-title">Siz</div>
          <video id="localVideo" autoplay muted playsinline></video>
        </div>

        <div class="card">
          <div class="card-title">Begona foydalanuvchi</div>
          <video id="remoteVideo" autoplay playsinline></video>
        </div>
      </div>

      <div class="card control-panel">
        <div class="button-row">
          <button id="startBtn" class="btn btn-blue">Kamera yoqish</button>
          <button id="nextBtn" class="btn btn-red">Next stranger</button>
          <button id="muteBtn" class="btn btn-gray">Mikrofon o‘chirish</button>
          <button id="cameraBtn" class="btn btn-gray">Kamera o‘chirish</button>
        </div>

        <div id="status" class="status-box">Boshlash uchun kamera yoqing.</div>
      </div>
    </div>

    <!-- O‘ng tomonda chat -->
    <div class="card chat-card">
      <div class="chat-header">Chat</div>
      <div id="chatMessages" class="chat-box"></div>

      <div class="chat-input-row">
        <input id="messageInput" type="text" placeholder="Xabar yozing..." />
        <button id="sendBtn" class="btn send-btn">Yuborish</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    // Socket.io ulanish
    const socket = io();

    // DOM elementlarni olish
    const onlineCount = document.getElementById("onlineCount");
    const statusBox = document.getElementById("status");
    const localVideo = document.getElementById("localVideo");
    const remoteVideo = document.getElementById("remoteVideo");
    const chatMessages = document.getElementById("chatMessages");
    const messageInput = document.getElementById("messageInput");

    const startBtn = document.getElementById("startBtn");
    const nextBtn = document.getElementById("nextBtn");
    const muteBtn = document.getElementById("muteBtn");
    const cameraBtn = document.getElementById("cameraBtn");
    const sendBtn = document.getElementById("sendBtn");

    // Media va WebRTC o‘zgaruvchilar
    let localStream = null;
    let peerConnection = null;
    let audioEnabled = true;
    let videoEnabled = true;

    // STUN serverlar
    const rtcConfig = {
      iceServers: [
        { urls: "stun:stun.l.google.com:19302" },
        { urls: "stun:stun1.l.google.com:19302" }
      ]
    };

    /**
     * Status matnini yangilaydi
     */
    function setStatus(text) {
      statusBox.textContent = text;
    }

    /**
     * Chatga yangi xabar qo‘shadi
     */
    function addMessage(text, type) {
      const div = document.createElement("div");
      div.className = "msg " + type;
      div.textContent = text;
      chatMessages.appendChild(div);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    /**
     * Peer connectionni yopadi
     */
    function closePeerConnection() {
      if (peerConnection) {
        peerConnection.onicecandidate = null;
        peerConnection.ontrack = null;
        peerConnection.close();
        peerConnection = null;
      }

      remoteVideo.srcObject = null;
    }

    /**
     * Kamera va mikrofonni yoqadi
     */
    async function ensureMedia() {
      if (localStream) return true;

      try {
        localStream = await navigator.mediaDevices.getUserMedia({
          video: true,
          audio: true
        });

        localVideo.srcObject = localStream;
        setStatus("Kamera va mikrofon yoqildi. Foydalanuvchi kutilmoqda...");
        addMessage("Kamera va mikrofon yoqildi.", "system");
        return true;
      } catch (error) {
        console.error("Media error:", error);
        setStatus("Kamera xatosi: " + error.name + " - " + error.message);
        addMessage("Kamera xatosi: " + error.name, "system");
        return false;
      }
    }

    /**
     * Peer connection yaratadi
     */
    function createPeerConnection() {
      closePeerConnection();

      peerConnection = new RTCPeerConnection(rtcConfig);

      // O‘zimizning audio/video tracklarni qo‘shamiz
      if (localStream) {
        localStream.getTracks().forEach((track) => {
          peerConnection.addTrack(track, localStream);
        });
      }

      // ICE candidate kelganda server orqali sherikka yuboramiz
      peerConnection.onicecandidate = (event) => {
        if (event.candidate) {
          socket.emit("signal", {
            type: "candidate",
            candidate: event.candidate
          });
        }
      };

      // Qarshi taraf video track yuborsa, remote videoga biriktiramiz
      peerConnection.ontrack = (event) => {
        remoteVideo.srcObject = event.streams[0];
      };
    }

    /**
     * Offer yaratib sherikka yuboradi
     */
    async function createAndSendOffer() {
      if (!peerConnection) return;

      const offer = await peerConnection.createOffer();
      await peerConnection.setLocalDescription(offer);

      socket.emit("signal", {
        type: "offer",
        sdp: offer
      });
    }

    /**
     * Chat xabarini yuboradi
     */
    function sendMessage() {
      const text = messageInput.value.trim();
      if (!text) return;

      socket.emit("chat-message", text);
      addMessage("Siz: " + text, "me");
      messageInput.value = "";
    }

    // Kamera yoqish tugmasi
    startBtn.addEventListener("click", async () => {
      const ok = await ensureMedia();
      if (ok) {
        startBtn.disabled = true;
        startBtn.style.opacity = "0.7";
      }
    });

    // Next stranger tugmasi
    nextBtn.addEventListener("click", () => {
      closePeerConnection();
      socket.emit("next-stranger");
      addMessage("Yangi foydalanuvchi qidirilmoqda...", "system");
      setStatus("Yangi foydalanuvchi qidirilmoqda...");
    });

    // Mikrofon yoqish/o‘chirish
    muteBtn.addEventListener("click", () => {
      if (!localStream) return;

      audioEnabled = !audioEnabled;

      localStream.getAudioTracks().forEach((track) => {
        track.enabled = audioEnabled;
      });

      muteBtn.textContent = audioEnabled
        ? "Mikrofon o‘chirish"
        : "Mikrofon yoqish";
    });

    // Kamera yoqish/o‘chirish
    cameraBtn.addEventListener("click", () => {
      if (!localStream) return;

      videoEnabled = !videoEnabled;

      localStream.getVideoTracks().forEach((track) => {
        track.enabled = videoEnabled;
      });

      cameraBtn.textContent = videoEnabled
        ? "Kamera o‘chirish"
        : "Kamera yoqish";
    });

    // Xabar yuborish
    sendBtn.addEventListener("click", sendMessage);

    // Enter bilan yuborish
    messageInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        sendMessage();
      }
    });

    // Online soni
    socket.on("online-count", (count) => {
      onlineCount.textContent = count;
    });

    // Status matni
    socket.on("status", (text) => {
      setStatus(text);
    });

    // Juft topilganda
    socket.on("matched", async ({ initiator }) => {
      addMessage("Siz yangi foydalanuvchiga ulandingiz.", "system");
      setStatus("Ulandi. Video aloqa tayyorlanmoqda...");

      const ok = await ensureMedia();
      if (!ok) return;

      createPeerConnection();

      // Bitta tomon offer boshlaydi
      if (initiator) {
        await createAndSendOffer();
      }
    });

    // Sherikdan text xabar kelganda
    socket.on("chat-message", (text) => {
      addMessage("Begona: " + text, "stranger");
    });

    // Sherik chiqib ketganda
    socket.on("partner-left", () => {
      closePeerConnection();
      addMessage("Foydalanuvchi chiqib ketdi.", "system");
      setStatus("Sherik chiqib ketdi. Yangi foydalanuvchi kutilmoqda...");
    });

    // WebRTC signal kelganda
    socket.on("signal", async (data) => {
      try {
        if (!peerConnection) {
          const ok = await ensureMedia();
          if (!ok) return;
          createPeerConnection();
        }

        if (data.type === "offer") {
          await peerConnection.setRemoteDescription(
            new RTCSessionDescription(data.sdp)
          );

          const answer = await peerConnection.createAnswer();
          await peerConnection.setLocalDescription(answer);

          socket.emit("signal", {
            type: "answer",
            sdp: answer
          });
        }

        if (data.type === "answer") {
          await peerConnection.setRemoteDescription(
            new RTCSessionDescription(data.sdp)
          );
        }

        if (data.type === "candidate" && data.candidate) {
          await peerConnection.addIceCandidate(
            new RTCIceCandidate(data.candidate)
          );
        }
      } catch (error) {
        console.error("Signal error:", error);
        setStatus("Signal xatosi: " + error.message);
      }
    });
  </script>
</body>
</html>
